<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediBook</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div class="auth-container fade-up visible">
        <div class="auth-header">
            <a href="../index.html" class="logo">MediBook</a>
            <h1>Welcome back</h1>
            <p>Login to manage your appointments</p>
        </div>
        
        <div id="authError" class="auth-error"></div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="••••••••">
            <button class="password-toggle" onclick="togglePass('loginPass')">👁️</button>
        </div>

        <button class="btn btn-primary btn-full" onclick="handleLogin()">Login</button>
        
        <div class="divider"><span>OR</span></div>
        
        <button class="btn btn-outline btn-full" onclick="demoLogin()">Use Demo Account</button>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Sign up</a>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script>
        if(Storage.getUser()) window.location.href = 'dashboard.html';

        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            const errorDiv = document.getElementById('authError');

            if(!email || !pass) {
                errorDiv.innerText = 'Please fill all fields';
                errorDiv.style.display = 'block';
                return;
            }
            if(!/\S+@\S+\.\S+/.test(email)) {
                errorDiv.innerText = 'Invalid email format';
                errorDiv.style.display = 'block';
                return;
            }
            if(pass.length < 6) {
                errorDiv.innerText = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }

            Storage.saveUser({ name: email.split('@')[0], email, initials: email.charAt(0).toUpperCase() });
            window.location.href = 'dashboard.html';
        }

        function demoLogin() {
            Storage.saveUser({ name: 'Demo User', email: 'demo@medibook.com', initials: 'DU' });
            window.location.href = 'dashboard.html';
        }

        document.addEventListener('keyup', (e) => {
            if(e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
